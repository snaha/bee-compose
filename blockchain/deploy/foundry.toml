# Foundry project that deploys the Swarm contracts onto a scratch Anvil
# instance, producing the snapshot consumed by blockchain/Dockerfile.
#
# Two solc versions are required:
#   - 0.8.19 for storage-incentives (Postage, Oracle, Staking, Redistribution, TestToken)
#   - 0.7.6  for swap-swear-and-swindle (SimpleSwapFactory, ERC20SimpleSwap)
# Foundry handles per-file solc selection via auto_detect_solc.
#
# Two OpenZeppelin versions are required for the same reason. They live in
# separate lib/ directories and are wired in via remappings, with a path-scoped
# override so swap-swear sources resolve `@openzeppelin/contracts/...` to the
# 3.4 line while everything else picks up 4.8.2.
[profile.default]
src = "src"
out = "out"
libs = ["lib"]
script = "script"
auto_detect_solc = true
auto_detect_remappings = false   # we set them explicitly in remappings.txt
optimizer = true
optimizer_runs = 200
# Verbosity for CI/script runs is bumped via the -vvv flag in redeploy-contracts.sh.
