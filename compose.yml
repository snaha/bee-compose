name: bee-compose

# Reusable bee env block. Everything that's identical across queen + workers lives here.
# Contract addresses are produced by blockchain/deploy/script/Deploy.s.sol —
# scripts/redeploy-contracts.sh prints them at the end of every run. They're
# stable across runs as long as the deployer EOA, deploy order, and pinned
# contract submodules don't change. Update both these values and the baked
# snapshot together via the redeploy script.
x-bee-env: &bee-env
  BEE_WARMUP_TIME: 10s
  BEE_PASSWORD: password
  BEE_VERBOSITY: "4"
  BEE_MAINNET: "false"
  BEE_BLOCK_TIME: "5"
  BEE_API_ADDR: 0.0.0.0:1633
  BEE_CORS_ALLOWED_ORIGINS: "*"
  BEE_ALLOW_PRIVATE_CIDRS: "true"
  BEE_BOOTNODE_MODE: "false"
  BEE_SWAP_ENABLE: "true"
  BEE_SWAP_ENDPOINT: http://blockchain:9545
  BEE_BLOCKCHAIN_RPC_ENDPOINT: http://blockchain:9545
  BEE_NETWORK_ID: "4020"
  BEE_POSTAGE_STAMP_START_BLOCK: "1"
  BEE_SWAP_FACTORY_ADDRESS: "0x5FC8d32690cc91D4c39d9d3abcBD16989F875707"
  BEE_POSTAGE_STAMP_ADDRESS: "0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512"
  BEE_PRICE_ORACLE_ADDRESS: "0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0"
  BEE_STAKING_ADDRESS: "0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9"
  BEE_REDISTRIBUTION_ADDRESS: "0xDc64a140Aa3E981100a9becA4E685f962f0cF6C9"

# Shared worker scaffolding. Each worker service still needs its own image,
# volume, and ports because identities are baked at build time. environment
# is set per-service (not here) so each worker's BEE_FULL_NODE / BEE_BOOTNODE
# can be controlled independently — the CLI flips BEE_WORKER_N_FULL to switch
# a given worker between light and full at start time.
x-worker: &worker-defaults
  profiles: ["workers"]
  restart: unless-stopped
  depends_on:
    - queen
  command: start

services:
  blockchain:
    # Anvil instance booted from a state snapshot produced by deploying the
    # Swarm contracts from source. See blockchain/Dockerfile and
    # scripts/redeploy-contracts.sh. Bakes in the contract addresses pinned
    # in x-bee-env (factory, postage stamp, oracle, staking, redistribution)
    # plus 9 Bee node EOAs (queen + worker-1..8) pre-funded with 100 ETH +
    # 100k BZZ each, starts in <1s, and has no bind-mounted state — the
    # snapshot lives in the image.
    build:
      context: ./blockchain
      args:
        FOUNDRY_VERSION: ${FOUNDRY_VERSION:-stable}
    image: bee-compose:blockchain-${FOUNDRY_VERSION:-stable}
    container_name: bee-compose-blockchain
    restart: unless-stopped
    ports:
      - "127.0.0.1:9545:9545"
    volumes:
      - blockchain:/data
    healthcheck:
      test:
        - CMD-SHELL
        - "cast block-number --rpc-url http://localhost:9545 >/dev/null 2>&1 || exit 1"
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 3s

  queen:
    build:
      context: ./bee
      args:
        BEE_VERSION: ${BEE_VERSION:-2.7.1}
        ROLE: queen
    image: bee-compose:queen-${BEE_VERSION:-2.7.1}
    container_name: bee-compose-queen
    restart: unless-stopped
    depends_on:
      blockchain:
        condition: service_healthy
    ports:
      - "127.0.0.1:1633:1633"
      - "127.0.0.1:1634:1634"
    volumes:
      - queen:/home/bee/.bee
    command: start
    environment:
      <<: *bee-env
      BEE_FULL_NODE: "true"
      BEE_WELCOME_MESSAGE: "bee-compose queen"

  worker-1:
    <<: *worker-defaults
    build:
      context: ./bee
      args:
        BEE_VERSION: ${BEE_VERSION:-2.7.1}
        ROLE: worker-1
    image: bee-compose:worker-1-${BEE_VERSION:-2.7.1}
    container_name: bee-compose-worker-1
    ports:
      - "127.0.0.1:16331:1633"
      - "127.0.0.1:16341:1634"
    volumes:
      - worker-1:/home/bee/.bee
    environment:
      <<: *bee-env
      BEE_FULL_NODE: ${BEE_WORKER_1_FULL:-false}
      BEE_BOOTNODE: ${QUEEN_BOOTNODE:-}

  worker-2:
    <<: *worker-defaults
    build:
      context: ./bee
      args:
        BEE_VERSION: ${BEE_VERSION:-2.7.1}
        ROLE: worker-2
    image: bee-compose:worker-2-${BEE_VERSION:-2.7.1}
    container_name: bee-compose-worker-2
    ports:
      - "127.0.0.1:16332:1633"
      - "127.0.0.1:16342:1634"
    volumes:
      - worker-2:/home/bee/.bee
    environment:
      <<: *bee-env
      BEE_FULL_NODE: ${BEE_WORKER_2_FULL:-false}
      BEE_BOOTNODE: ${QUEEN_BOOTNODE:-}

  worker-3:
